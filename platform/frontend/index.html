<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="인구감소 사회문제 해결을 위한 MLOps 성능 모니터링, 자동 재학습 오케스트레이션, DataOps 연동, 정책 시뮬레이션 및 자동 리포팅 통합 R&D 플랫폼"
    />
    <title>인구감소 R&D 통합 플랫폼 | MLOps & DataOps</title>

    <!-- FontAwesome Icons (CDN) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Leaflet CSS (CDN) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <!-- 초기 테마 적용 (FOUC 방지: React 마운트 전에 data-theme 설정) -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("decline-poc-theme");
          var theme =
            saved === "dark" || saved === "light"
              ? saved
              : window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
